services:
  olr:
    image: olr-dev:${OLR_IMAGE_TAG:-latest}
    entrypoint: []
    command: ["sleep", "infinity"]
    volumes:
      - ../../../..:/opt/OpenLogReplicator-local

  oracle:
    image: gvenzl/oracle-xe:21.3.0-slim-faststart
    container_name: oracle
    ports:
      - "1521:1521"
    environment:
      ORACLE_PASSWORD: oracle
      APP_USER: olr_test
      APP_USER_PASSWORD: olr_test
    volumes:
      - ./oracle-init:/container-entrypoint-initdb.d
    env_file: .env
    healthcheck:
      test: ["CMD-SHELL", "echo 'SELECT 1 FROM dual;' | sqlplus -S \"${DB_CONN}\" | grep -q 1"]
      interval: 10s
      timeout: 5s
      retries: 30
